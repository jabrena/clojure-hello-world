name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up GraalVM JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: graalvm
          java-version: "25"

      - name: Install Clojure CLI
        uses: DeLaGuardo/setup-clojure@13
        with:
          cli: latest

      - name: Run tests
        run: clojure -M:test

      - name: Run application (smoke)
        run: clojure -M:run
