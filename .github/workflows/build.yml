name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Install Clojure CLI
        uses: DeLaGuardo/setup-clojure@13
        with:
          cli: latest

      - name: Build with Maven
        run: ./mvnw -B -ntp verify

      - name: Run main via vivid
        run: ./mvnw -B -ntp vivid:clojure-maven-plugin:0.3.0:clojure@run
